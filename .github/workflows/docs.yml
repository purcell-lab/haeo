name: Deploy Documentation

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps firefox

      - name: Generate guide screenshots
        run: uv run pytest -m guide -v --timeout=300

      - name: Optimize screenshots
        run: |
          sudo apt-get install -y optipng
          find docs -name '*.png' -exec optipng -o5 -quiet {} +

      - name: Build main documentation
        run: uv run zensical build

      - name: Assemble versioned site
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python tools/assemble_docs.py --main-site ./site --output ./public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from the canonical repo. Forks still run the build job above
    # to catch documentation breakage, but they don't have Pages enabled.
    if: github.repository == 'hass-energy/haeo'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
