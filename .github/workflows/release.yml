name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0

      - name: Extract and validate version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Tag: $TAG"
          echo "Version: $VERSION"

          # PEP 440-compatible: vX.Y.Z, optional pre-release (rcN/aN/bN),
          # optional post-release (.postN), optional dev-release (.devN).
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+((rc|a|b)[0-9]+)?(\.post[0-9]+)?(\.dev[0-9]+)?$ ]]; then
            echo "::error::Release tag '$TAG' does not match expected format (vX.Y.Z[rcN|aN|bN][.postN][.devN])"
            exit 1
          fi

      - name: Check pyproject.toml version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Check manifest.json version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          MANIFEST_VERSION=$(jq -r '.version' custom_components/haeo/manifest.json)
          echo "Tag version: $TAG_VERSION"
          echo "manifest.json version: $MANIFEST_VERSION"
          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

  upload-assets:
    name: Upload release assets
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Build forecast card bundle
        run: |
          npm --prefix frontend/haeo-forecast-card ci
          npm --prefix frontend/haeo-forecast-card run build

      - name: Create release package
        run: |
          cd custom_components/haeo
          zip -r ../../haeo.zip . \
            --exclude "tests/" "tests/*" "*/tests/" "*/tests/*" \
            --exclude "*/__pycache__/" "*/__pycache__/*"

      - name: Upload release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            haeo.zip

  build-docs:
    name: Build and attach docs
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps firefox

      - name: Generate guide screenshots
        run: uv run pytest -m guide -v --timeout=300

      - name: Optimize screenshots
        run: |
          sudo apt-get install -y optipng
          find docs -name '*.png' -exec optipng -o5 -quiet {} +

      - name: Build documentation
        run: |
          if [ -f zensical.toml ] || grep -q '"zensical' pyproject.toml; then
            uv run zensical build
          else
            uv run mkdocs build
          fi

      - name: Package documentation
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cd site
          zip -r "../docs-${TAG}.zip" .

      - name: Upload docs as release asset
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            docs-${{ github.event.release.tag_name }}.zip
